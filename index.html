    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Ekadashi Sacred Palette */
            --divine-gold: #FFD700;
            --sacred-saffron: #FF9933;
            --holy-orange: #FF6B35;
            --lotus-pink: #FF69B4;
            --peace-green: #98D8C8;
            --spiritual-teal: #2EC4B6;
            --meditation-blue: #4A90E2;
            --cosmic-purple: #9B59B6;
            --deep-indigo: #2C3E50;
            --night-sky: #0A0E27;
            --temple-white: #FFF8F0;
            --moonlight: #F8F9FA;
            --success-green: #10B981;
            --warm-glow: #FFF4E6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, 
                var(--night-sky) 0%, 
                #1a1f3a 25%,
                #2d1b4e 50%,
                #1a2845 75%,
                var(--night-sky) 100%);
            color: var(--temple-white);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated cosmic background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(152, 216, 200, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(74, 144, 226, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating particles */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(2px 2px at 60% 70%, rgba(152, 216, 200, 0.3), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(255, 153, 51, 0.3), transparent),
                radial-gradient(2px 2px at 90% 60%, rgba(74, 144, 226, 0.2), transparent);
            background-size: 200% 200%;
            animation: particles 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes particles {
            0%, 100% { transform: translate(0, 0); opacity: 1; }
            50% { transform: translate(-10px, -10px); opacity: 0.8; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Enhanced Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
            position: relative;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .om-symbol {
            font-size: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
            animation: omPulse 4s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes omPulse {
            0%, 100% { 
                transform: scale(1) rotate(0deg); 
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
            }
            50% { 
                transform: scale(1.1) rotate(5deg); 
                filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.9));
            }
        }

        h1 {
            font-family: 'Italiana', serif;
            font-size: 72px;
            font-weight: 400;
            background: linear-gradient(135deg, 
                var(--divine-gold) 0%, 
                var(--sacred-saffron) 25%,
                var(--holy-orange) 50%,
                var(--sacred-saffron) 75%,
                var(--divine-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--peace-green);
            letter-spacing: 4px;
            opacity: 0.95;
            font-weight: 300;
            text-transform: uppercase;

        .lotus-decoration {
            font-size: 40px;
            margin: 20px 0;
            opacity: 0.7;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Enhanced Card */
        .card {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0.08) 100%);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 50px;
            border: 2px solid transparent;
            background-image: 
                linear-gradient(135deg, rgba(10, 14, 39, 0.9), rgba(10, 14, 39, 0.9)),
                linear-gradient(135deg, var(--divine-gold), var(--spiritual-teal), var(--cosmic-purple));

            background-clip: padding-box, border-box;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

        .connection-status {
            padding: 20px 30px;
            border-radius: 20px;

                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Enhanced Buttons */
        button {
            width: 100%;
            padding: 22px;
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(135deg, 
                var(--divine-gold) 0%,
                var(--sacred-saffron) 50%,
                var(--holy-orange) 100%);

            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;

            transition: width 0.6s, height 0.6s;

        button:hover::before {
            width: 400px;

            transform: translateY(-4px);

                inset 0 1px 0 rgba(255, 255, 255, 0.4);

            transform: translateY(-2px);

        button span {
            position: relative;
            z-index: 1;

            background: linear-gradient(135deg, rgba(152, 216, 200, 0.2), rgba(46, 196, 182, 0.2));
            color: var(--spiritual-teal);

            font-size: 18px;
            box-shadow: 0 0 20px rgba(46, 196, 182, 0.3);

        .test-button:hover {

            box-shadow: 0 0 30px rgba(46, 196, 182, 0.5);
        }

        /* Results Section */
        .result {
            margin-top: 40px;
            padding: 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 25px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            animation: resultFadeIn 0.6s ease-out;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        @keyframes resultFadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.95) translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
        }

        .result h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            background: linear-gradient(135deg, var(--divine-gold), var(--peace-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .result-content {
            font-size: 22px;
            line-height: 1.8;
            color: var(--moonlight);
        }

        /* Ekadashi Yes/No States */
        .ekadashi-yes {
            background: linear-gradient(135deg, 
                rgba(16, 185, 129, 0.2) 0%,
                rgba(152, 216, 200, 0.2) 100%);
            border: 3px solid var(--success-green);
            color: var(--success-green);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 
                0 0 40px rgba(16, 185, 129, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: successPulse 2s ease-in-out infinite;
        }

        @keyframes successPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 40px rgba(16, 185, 129, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            50% { 
                box-shadow: 
                    0 0 60px rgba(16, 185, 129, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
        }

        .ekadashi-no {
            text-align: center;
            padding: 30px;
            font-size: 24px;
            opacity: 0.85;
            color: var(--peace-green);
        }

        /* Next Ekadashi Card */
        .next-ekadashi-card {
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.15) 0%,
                rgba(255, 153, 51, 0.15) 50%,
                rgba(152, 216, 200, 0.15) 100%);
            padding: 40px;
            border-radius: 25px;
            border: 3px solid var(--divine-gold);
            text-align: center;
            margin: 30px 0;
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% { 
                box-shadow: 
                    0 0 40px rgba(255, 215, 0, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
            50% { 
                box-shadow: 
                    0 0 60px rgba(255, 215, 0, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
        }

        .next-ekadashi-date {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--divine-gold), var(--sacred-saffron));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;

        .next-ekadashi-days {
            font-size: 24px;
            color: var(--peace-green);

        .paksha-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;

            font-weight: 700;
            margin-left: 12px;

            text-transform: uppercase;
        }

        .paksha-shukla {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.3), rgba(152, 216, 200, 0.3));
            border: 2px solid var(--meditation-blue);
            color: var(--meditation-blue);
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.3);
        }

        .paksha-krishna {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.3), rgba(255, 105, 180, 0.3));
            border: 2px solid var(--cosmic-purple);
            color: var(--lotus-pink);
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.3);
        }

        /* Year View */
        .year-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(152, 216, 200, 0.15));
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.4);
        }

        .year-header .total {
            font-size: 28px;
            background: linear-gradient(135deg, var(--divine-gold), var(--peace-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            letter-spacing: 1px;
        }

        .date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

        }

        .date-card {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0.05) 100%);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .date-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.1) 0%,
                rgba(152, 216, 200, 0.1) 100%);

            transition: opacity 0.4s ease;
        }

        .date-card:hover::before {
            opacity: 1;
        }

        .date-card:hover {
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.12) 0%,
                rgba(255, 255, 255, 0.08) 100%);

            transform: translateY(-8px) scale(1.02);

        }

            background: linear-gradient(135deg, var(--divine-gold), var(--sacred-saffron));

            z-index: 1;

        /* Error State */
        .error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(255, 107, 53, 0.2));

                    <option value="tomorrow">🌅 Is Tomorrow Ekadashi?</option>
                    <option value="next">✨ Next Ekadashi Date</option>
                    <option value="year">📅 All Ekadashis in a Year</option>
                    <option value="check">🔍 Check Specific Date</option>
                </select>
            </div>

            <!-- Dynamic Input Section -->
            <div id="inputSection"></div>

            <!-- Action Button -->
            <button id="actionBtn" onclick="performAction()" style="display: none;">
                <span>🙏 DISCOVER</span>
            </button>

            <!-- Results Section -->
            <div id="result"></div>
        </div>

        <footer>
            🪷 May this sacred day bring peace, prosperity, and spiritual growth 🪷
        </footer>
    </div>

    <script>
        let isConnected = false;
        let apiUrl = '';

        // Test API Connection
        async function testConnection() {
            const url = document.getElementById('apiUrl').value.trim();
            const statusDiv = document.getElementById('connectionStatus');
            
            if (!url) {
                alert('⚠️ Please enter API URL');
                return;
            }

            statusDiv.innerHTML = '🟡 Testing connection...';
            statusDiv.className = 'connection-status status-testing';
            
            try {
                const response = await fetch(`${url}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                if (response.ok) {
                    const data = await response.json();
                    isConnected = true;
                    apiUrl = url;
                    statusDiv.innerHTML = '✅ Connected Successfully: ' + data.message;
                    statusDiv.className = 'connection-status status-connected';
                } else {
                    throw new Error('Connection failed');
                }
            } catch (error) {
                isConnected = false;
                statusDiv.innerHTML = '🔴 Connection Failed - Please check if API is online';
                statusDiv.className = 'connection-status status-disconnected';
                console.error('Connection error:', error);
            }
        }

        // Handle feature selection change
        function handleFeatureChange() {
            const feature = document.getElementById('feature').value;
            const inputSection = document.getElementById('inputSection');
            const actionBtn = document.getElementById('actionBtn');
            const result = document.getElementById('result');
            
            result.innerHTML = '';
            
            if (!feature) {
                inputSection.innerHTML = '';
                actionBtn.style.display = 'none';
                return;
            }

            if (feature === 'year') {
                inputSection.innerHTML = `
                    <div class="form-group">
                        <label for="yearInput">📆 Enter Year</label>
                        <input type="number" id="yearInput" placeholder="2025" min="2000" max="2100" value="2025">
                    </div>
                `;
            } else if (feature === 'check') {
                inputSection.innerHTML = `
                    <div class="form-group">
                        <label for="dateInput">🗓️ Enter Date (YYYY-MM-DD)</label>
                        <input type="text" id="dateInput" placeholder="2025-03-15">
                    </div>
                `;
            } else {
                inputSection.innerHTML = '';
            }

            actionBtn.style.display = 'block';
        }

        // Perform the selected action
        async function performAction() {
            if (!isConnected) {
                alert('⚠️ Please test connection first!');
                return;
            }

            const feature = document.getElementById('feature').value;
            const result = document.getElementById('result');

            result.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>✨ Calculating Sacred Dates...</p>
                </div>
            `;

            try {
                switch(feature) {
                    case 'today':
                        await checkToday();
                        break;
                    case 'tomorrow':
                        await checkTomorrow();
                        break;
                    case 'next':
                        await showNext();
                        break;
                    case 'year':
                        await showYear();
                        break;
                    case 'check':
                        await checkDate();
                        break;
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        // Helper function to format date nicely
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        function formatDateShort(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                year: 'numeric'
            });
        }

        function getWeekday(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { weekday: 'long' });
        }

        // Check if today is Ekadashi
        async function checkToday() {
            const response = await fetch(`${apiUrl}/today`);
            const data = await response.json();
            
            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>🌙 ${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ YES! Today is Ekadashi ✨<br>🙏 Observe fasting and prayers<br>🕉️ Seek spiritual blessings</div>' 
                            : '<div class="ekadashi-no">🌟 Today is not Ekadashi<br>Check the next sacred date below</div>'}
                    </div>
                </div>
            `;
        }

        // Check if tomorrow is Ekadashi
        async function checkTomorrow() {
            const response = await fetch(`${apiUrl}/tomorrow`);
            const data = await response.json();
            
            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>🌅 ${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ YES! Tomorrow is Ekadashi ✨<br>🙏 Prepare for fasting<br>🕉️ Begin spiritual preparation</div>' 
                            : '<div class="ekadashi-no">🌟 Tomorrow is not Ekadashi<br>Plan ahead for the next sacred day</div>'}
                    </div>
                </div>
            `;
        }

        // Show next Ekadashi
        async function showNext() {
            const response = await fetch(`${apiUrl}/next`);
            const data = await response.json();
            
            // Handle both string format and object format
            let dateStr, paksha;
            if (typeof data === 'string') {
                dateStr = data;
            } else if (data.date) {
                dateStr = data.date;
                paksha = data.paksha;
            }
            
            const formatted = formatDate(dateStr);
            const today = new Date();
            const nextDate = new Date(dateStr);
            const daysUntil = Math.ceil((nextDate - today) / (1000 * 60 * 60 * 24));

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>✨ Next Sacred Ekadashi</h3>
                    <div class="result-content">
                        <div class="next-ekadashi-card">
                            <div class="next-ekadashi-date">
                                ${formatted}
                                ${paksha ? `<span class="paksha-badge paksha-${paksha.toLowerCase()}">${paksha} Paksha</span>` : ''}
                            </div>
                            <div class="next-ekadashi-days">
                                ⏳ ${daysUntil} ${daysUntil === 1 ? 'day' : 'days'} from today
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Show all Ekadashis in a year
        async function showYear() {
            const year = document.getElementById('yearInput').value;
            
            if (!year) {
                alert('⚠️ Please enter a year');
                return;
            }

            const response = await fetch(`${apiUrl}/year/${year}`);
            const data = await response.json();

            // Handle both array of strings and array of objects
            let ekadashis = data.dates;
            
            const dateCards = ekadashis.map((item, index) => {
                let dateStr, paksha;
                
                if (typeof item === 'string') {
                    dateStr = item;
                } else {
                    dateStr = item.date;
                    paksha = item.paksha;
                }
                
                return `
                    <div class="date-card">
                        <div class="date-card-number">✨ Ekadashi #${index + 1}</div>
                        <div class="date-card-date">
                            ${formatDateShort(dateStr)}
                            ${paksha ? `<span class="paksha-badge paksha-${paksha.toLowerCase()}">${paksha}</span>` : ''}
                        </div>
                        <div class="date-card-day">🗓️ ${getWeekday(dateStr)}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>📅 All Ekadashis in ${year}</h3>
                    <div class="result-content">
                        <div class="year-header">
                            <div class="total">🕉️ Total: ${data.total} Sacred Ekadashis 🕉️</div>
                        </div>
                        <div class="date-grid">
                            ${dateCards}
                        </div>
                    </div>
                </div>
            `;
        }

        // Check specific date
        async function checkDate() {
            const dateInput = document.getElementById('dateInput').value;
            
            if (!dateInput) {
                alert('⚠️ Please enter a date in YYYY-MM-DD format');
                return;
            }

            const response = await fetch(`${apiUrl}/check/${dateInput}`);
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            const dateStr = formatDate(data.date);

            document.getElementById('result').innerHTML = `
                <div class="result">
                    <h3>🔍 ${dateStr}</h3>
                    <div class="result-content">
                        ${data.is_ekadashi 
                            ? '<div class="ekadashi-yes">✨ This date IS Ekadashi ✨<br>🙏 A sacred day for fasting</div>' 
                            : '<div class="ekadashi-no">🌟 This date is NOT Ekadashi<br>Choose another date to check</div>'}
                    </div>
                </div>
            `;
        }

        // Auto-test connection on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });


        <section style="margin-top: 50px; padding: 20px; border-top: 1px solid #eee;">
    <h2>What is Ekadashi?</h2>
    <p>Ekadashi occurs twice a month on the eleventh day of the lunar fortnight. Fasting on these days is considered spiritually beneficial in many traditions. Our tool provides precise timings for your location.</p>
    
    <h3>Why use this reminder?</h3>
    <ul>
        <li><strong>Accuracy:</strong> Syncs with lunar calendars for real-time updates.</li>
        <li><strong>Automation:</strong> Set it once and get notified before every fast.</li>
    </ul>
</section>
    </script>
</body>
</html>
